<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đặt Xe</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<div class="logo">AutoRent</div>

<nav>
<a href="index.html">Trang chủ</a>
<a href="cars.html">Xe cho thuê</a>
<a href="booking.html">Đặt xe</a>
<a href="contact.html">Liên hệ</a>
</nav>
</header>

<section class="section">

<h2 class="title">Đặt Xe</h2>

<div class="form-box">

<input
type="text"
id="selectedCar"
readonly
placeholder="Tên xe">

<input
type="text"
id="fullname"
placeholder="Họ và tên">

<input
type="tel"
id="phone"
placeholder="Số điện thoại">

<label>Ngày nhận xe</label>
<input type="date" id="pickupDate" onchange="calculatePrice()">

<label>Ngày trả xe</label>
<input type="date" id="returnDate" onchange="calculatePrice()">

<h3 id="totalPrice">
Tổng tiền: 0 đ
</h3>

<button onclick="submitBooking()">
Xác Nhận Đặt Xe
</button>

</div>

</section>

<footer>
© 2026 AutoRent
</footer>

<script src="script.js"></script>

</body>
</html>
